name: Build and Release

on:
  push:
    tags:
      - 'v*' 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Spicetify CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/spicetify/cli/main/install.sh -o install.sh
          echo "n" | sh install.sh
          echo "$HOME/.spicetify" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm install
        
      - name: Build app
        run: npm run build 
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/extension.js
